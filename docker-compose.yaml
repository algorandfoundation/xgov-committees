version: "3.8"
services:
  localstack:
    container_name: localstack-s3
    image: localstack/localstack:s3-latest # Use the S3-only image
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      # Optional: persist data to a local directory
      - S3_DIR=/tmp/s3
    volumes:
      - ./s3-data:/tmp/s3 # Mount a local folder for persistence